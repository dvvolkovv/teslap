name: teslapay
description: TeslaPay - European Neobank mobile application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0

  # Dependency Injection
  get_it: ^8.0.2
  injectable: ^2.5.0

  # Secure Storage
  flutter_secure_storage: ^9.2.3

  # Biometric Authentication
  local_auth: ^2.3.0

  # Typography / Fonts
  google_fonts: ^6.2.1

  # Icons
  phosphor_flutter: ^2.1.0

  # Internationalization / Formatting
  intl: ^0.19.0

  # Immutable Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utilities
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.2
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
